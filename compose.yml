services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://localhost:8443/api
        - NEXT_PUBLIC_BASE_URL=https://localhost:8443
    container_name: selfizee-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost:8443/api
      - NEXT_PUBLIC_BASE_URL=https://localhost:8443
    depends_on:
      - backend
    networks:
      - selfizee-net

  backend:
    build: ./backend
    container_name: selfizee-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./storage:/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - selfizee-net

  celery-worker:
    build: ./backend
    container_name: selfizee-celery
    restart: unless-stopped
    command: bash celery_worker.sh
    env_file:
      - .env
    volumes:
      - ./storage:/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - selfizee-net

  db:
    image: postgres:16-alpine
    container_name: selfizee-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: selfizee_transfer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - selfizee-net

  redis:
    image: redis:7-alpine
    container_name: selfizee-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - selfizee-net

  mailpit:
    image: axllent/mailpit
    container_name: selfizee-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - selfizee-net

  nginx:
    image: nginx:alpine
    container_name: selfizee-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - selfizee-net

volumes:
  postgres_data:

networks:
  selfizee-net:
    driver: bridge

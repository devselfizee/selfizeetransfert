services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://transfert-api.konitys.fr/api}
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://transfert.konitys.fr}
        - NEXT_PUBLIC_KEYCLOAK_URL=${NEXT_PUBLIC_KEYCLOAK_URL:-https://plateform-auth.konitys.fr}
        - NEXT_PUBLIC_KEYCLOAK_REALM=${NEXT_PUBLIC_KEYCLOAK_REALM:-konitys}
        - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-plateform-frontend}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://transfert-api.konitys.fr/api}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://transfert.konitys.fr}
      - NEXT_PUBLIC_KEYCLOAK_URL=${NEXT_PUBLIC_KEYCLOAK_URL:-https://plateform-auth.konitys.fr}
      - NEXT_PUBLIC_KEYCLOAK_REALM=${NEXT_PUBLIC_KEYCLOAK_REALM:-konitys}
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-plateform-frontend}
    depends_on:
      - backend
    networks:
      - selfizee-net

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - storage_data:/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - selfizee-net

  celery-worker:
    build: ./backend
    restart: unless-stopped
    command: bash celery_worker.sh
    env_file:
      - .env
    volumes:
      - storage_data:/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - selfizee-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - selfizee-net

volumes:
  storage_data:

networks:
  selfizee-net:
    driver: bridge
